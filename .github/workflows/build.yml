name: Build check

# Smoke-test build for every PR — catches Rust/Node breakage before you tag
# a release. Doesn't produce installers; just confirms `tauri build` works
# on all three OSes.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-build:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf \
            libgtk-3-dev libxdo-dev libssl-dev

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm ci

      - name: Type-check frontend
        run: npx tsc -b --noEmit

      - name: Build (no bundling — just verify compile)
        run: npm run build && cd src-tauri && cargo check --release
