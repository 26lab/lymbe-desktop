name: Release

# Triggered whenever you push a tag like `v0.1.0`. Builds installers on
# native macOS / Windows / Linux runners in parallel and publishes a draft
# GitHub Release with all of them attached. Edit the draft + click
# "Publish" once you're happy with the release notes.
#
# macOS is split into two jobs (arm64 + x86_64) instead of one Universal
# build because Tauri's `--target universal-apple-darwin` is notoriously
# flaky in CI — this is the recommended split by the Tauri team itself.
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf \
            libgtk-3-dev libxdo-dev libssl-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust target dir
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm deps
        run: npm ci

      - name: Build + draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code-signing — fill these in via repo secrets once you have certs.
          # Without them the build still succeeds, just unsigned (SmartScreen
          # warning on Windows, Gatekeeper "unidentified developer" on macOS).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Lymbe AI Desktop ${{ github.ref_name }}'
          releaseBody: |
            Native Lymbe AI Desktop-Client.

            **Downloads:**
            - Windows: `.msi` (empfohlen) oder `.exe` (NSIS)
            - macOS Apple Silicon: `.dmg` (aarch64)
            - macOS Intel: `.dmg` (x64)
            - Linux: `.AppImage`, `.deb` oder `.rpm`

            Erste Schritte: nach dem Start in den Einstellungen Server-URL +
            API-Token aus dem Web-Dashboard (Profil → Meine Desktop-App) eintragen.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
